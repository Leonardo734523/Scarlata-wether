<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>locations</title>
    </head>
    <body>

        <h3>findings</h3>

        <ul>
            {%for location in locations%}

                <li>
                    <form method="post" action="{% url 'local' %}">

                        {% csrf_token %}
                        <input type="hidden" name="lat" value="{{ location.lat }}">
                        <input type="hidden" name="lon" value="{{ location.lon }}">
                        <button type="submit">{{ location.name }},{{ location.state }} </button>

                    </form>
                 
                </li>

            {%endfor%}

        </ul>

    </body>
</html>
